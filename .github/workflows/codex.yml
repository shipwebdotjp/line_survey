name: Codex pull request review

on:
  issue_comment:
    types: [created]

jobs:
  codex:
    runs-on: ubuntu-latest

    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@codex')

    permissions:
      contents: read
      pull-requests: read

    outputs:
      final_message: ${{ steps.filter.outputs.message }}
      should_post: ${{ steps.filter.outputs.should_post }}

    steps:
      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_JSON=$(gh api repos/$REPO/pulls/$PR_NUMBER)

          {
            echo "base_sha=$(echo "$PR_JSON" | jq -r '.base.sha')"
            echo "head_sha=$(echo "$PR_JSON" | jq -r '.head.sha')"
            echo "base_ref=$(echo "$PR_JSON" | jq -r '.base.ref')"
            echo "head_ref=$(echo "$PR_JSON" | jq -r '.head.ref')"

            echo "title<<EOF"
            echo "$PR_JSON" | jq -r '.title'
            echo "EOF"

            echo "body<<EOF"
            echo "$PR_JSON" | jq -r '.body // ""'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge
          persist-credentials: false

      - name: Pre-fetch base and head refs
        env:
          PR_NUMBER: ${{ github.event.issue.number }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          git fetch --no-tags origin \
            "+refs/heads/$BASE_REF:refs/remotes/origin/$BASE_REF" \
            "+refs/pull/$PR_NUMBER/head:refs/remotes/pull/$PR_NUMBER/head"

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          output-file: codex-output.md
          model: gpt-5.4-mini
          prompt: |
            This is PR #${{ github.event.issue.number }} for ${{ github.repository }}.

            Review ONLY the changes introduced by the PR.

            Use these commands as the source of truth:

              git log --oneline ${{ steps.pr.outputs.base_sha }}...${{ steps.pr.outputs.head_sha }}
              git diff ${{ steps.pr.outputs.base_sha }}...${{ steps.pr.outputs.head_sha }}

            Pull request title and body:
            ----
            ${{ steps.pr.outputs.title }}

            ${{ steps.pr.outputs.body }}
            ----

            Your role is to catch clear, actionable defects only.
            Do not suggest improvements.
            Do not enforce style.
            Do not narrate your process.
            Do not provide progress updates.
            Do not explain what you checked.

            Your final response must be exactly one of the following:

            1. Exactly `CODEX_NO_FINDINGS`
            2. A review block wrapped by `BEGIN_CODEX_REVIEW` and `END_CODEX_REVIEW`

            ---

            ## Review Criteria

            Before raising a finding, all three conditions below must be met:

            1. The issue clearly violates the PR description, OR the diff demonstrably breaks existing functionality, OR it will highly likely cause an exception, incorrect behavior, or data corruption during normal execution.
            2. The fix is entirely within the scope of this PR.
            3. The implementer can fix it without additional design decisions.

            Do NOT report findings for:
            - Style preferences or naming conventions
            - Speculative or unlikely edge cases
            - Architectural suggestions or refactoring opportunities
            - Anything requiring changes outside this PR

            ---

            ## Output Format

            If no findings meet all review criteria, output exactly:

            CODEX_NO_FINDINGS

            Do not output anything else.

            If findings exist, output exactly this structure:

            BEGIN_CODEX_REVIEW
            @jules
            Verify each finding against current code. Fix only still-valid issues, skip the rest with a brief reason, keep changes minimal, and validate.

            Do not apply speculative fixes.

            Preserve existing architecture unless the finding requires a structural change.

            Findings

            Finding 1 — {severity}: {file}:{line}
            Problem: {Clear description of what is wrong and why it is a defect.}

            Fix: {Concrete instruction for how to correct it.}

            Finding 2 — {severity}: {file}:{line}
            Problem: {Clear description of what is wrong and why it is a defect.}

            Fix: {Concrete instruction for how to correct it.}
            END_CODEX_REVIEW

            ---

            ## Severity levels

            - critical — data corruption, security issue, or crash in normal use
            - major — incorrect behavior that violates the PR description
            - minor — definite bug but low impact or rare trigger condition

            Do not include findings that do not meet all three review criteria above.
            Do not output anything outside the required final response format.

      - name: Filter Codex output
        id: filter
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os

          output_file = Path("codex-output.md")

          if output_file.exists():
              raw = output_file.read_text(encoding="utf-8").strip()
          else:
              raw = """${{ steps.run_codex.outputs.final-message }}""".strip()

          should_post = "false"
          message = ""

          if raw == "" or raw == "CODEX_NO_FINDINGS":
              should_post = "false"

          elif "BEGIN_CODEX_REVIEW" in raw and "END_CODEX_REVIEW" in raw:
              start = raw.index("BEGIN_CODEX_REVIEW") + len("BEGIN_CODEX_REVIEW")
              end = raw.index("END_CODEX_REVIEW")
              message = raw[start:end].strip()

              if message:
                  should_post = "true"

          else:
              # Ignore progress updates, narration, malformed responses, etc.
              should_post = "false"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"should_post={should_post}\n")
              f.write("message<<EOF\n")
              f.write(message)
              f.write("\nEOF\n")
          PY

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex

    if: needs.codex.outputs.should_post == 'true'

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Post Codex feedback
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}