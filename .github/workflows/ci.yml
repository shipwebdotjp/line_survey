name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker services
        run: docker compose up -d web

      - name: Install backend dependencies
        run: docker compose exec -T web composer install -d /var/www/backend

      - name: Run backend tests
        run: docker compose exec -T web /var/www/backend/vendor/bin/phpunit -c /var/www/backend/phpunit.xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Run frontend build check
        run: VITE_LIFF_ID=ci-placeholder npm run build
        working-directory: frontend
