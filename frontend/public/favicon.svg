    <line x1="32" y1="300" x2="200" y2="300" stroke="var(--color-text-secondary)" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(194, 192, 182);color:rgb(251, 251, 254);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
